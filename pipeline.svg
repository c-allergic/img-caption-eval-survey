<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b6cb0"/>
    </marker>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ebf4ff"/>
      <stop offset="100%" stop-color="#f0fff4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1100" height="900" fill="#f7fafc" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a202c">CapsBench Evaluation Pipeline</text>
  <text x="550" y="54" text-anchor="middle" font-size="12" fill="#718096">Playground v3 · arXiv:2409.10695 · 200 images · 2,471 yes-no questions · 17 categories</text>

  <!-- ===== PHASE 1: BENCHMARK CONSTRUCTION ===== -->
  <rect x="30" y="70" width="1040" height="340" rx="10" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1.5"/>
  <text x="550" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6cb0">Phase 1: Benchmark Construction</text>

  <!-- Step 1: Image Collection -->
  <rect x="80" y="110" width="200" height="80" rx="8" fill="#fff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="180" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6cb0">① Image Collection</text>
  <text x="180" y="158" text-anchor="middle" font-size="10" fill="#4a5568">200 images</text>
  <text x="180" y="172" text-anchor="middle" font-size="10" fill="#4a5568">9 diverse types*</text>

  <!-- Arrow -->
  <line x1="280" y1="150" x2="340" y2="150" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: QA Generation -->
  <rect x="350" y="110" width="280" height="80" rx="8" fill="#fff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="490" y="136" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6cb0">② Question-Answer Generation</text>
  <text x="490" y="154" text-anchor="middle" font-size="10" fill="#4a5568">Generate yes-no QA pairs from image</text>
  <text x="490" y="170" text-anchor="middle" font-size="10" fill="#4a5568">~12 questions/image · 2,471 total</text>

  <!-- Arrow -->
  <line x1="630" y1="150" x2="690" y2="150" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Category Assignment -->
  <rect x="700" y="110" width="310" height="80" rx="8" fill="#fff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="855" y="136" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6cb0">③ 17-Category Assignment</text>
  <text x="855" y="154" text-anchor="middle" font-size="10" fill="#4a5568">general, image type, text, color, position,</text>
  <text x="855" y="170" text-anchor="middle" font-size="10" fill="#4a5568">relation, entity, count, emotion, blur, ...</text>

  <!-- Dashed connector to categories detail -->
  <line x1="855" y1="190" x2="855" y2="220" stroke="#90cdf4" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Categories sub-box -->
  <rect x="60" y="210" width="980" height="90" rx="6" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1"/>
  <text x="550" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#4a5568">17 Evaluation Categories</text>
  
  <rect x="80" y="244" width="145" height="22" rx="4" fill="#bee3f8"/><text x="152" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">General</text>
  <rect x="235" y="244" width="145" height="22" rx="4" fill="#bee3f8"/><text x="307" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">Image Type</text>
  <rect x="390" y="244" width="100" height="22" rx="4" fill="#bee3f8"/><text x="440" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">Text</text>
  <rect x="500" y="244" width="100" height="22" rx="4" fill="#bee3f8"/><text x="550" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">Color</text>
  <rect x="610" y="244" width="100" height="22" rx="4" fill="#bee3f8"/><text x="660" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">Position</text>
  <rect x="720" y="244" width="100" height="22" rx="4" fill="#bee3f8"/><text x="770" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">Relation</text>
  <rect x="830" y="244" width="120" height="22" rx="4" fill="#bee3f8"/><text x="890" y="259" text-anchor="middle" font-size="9" fill="#2b6cb0">Rel. Position</text>

  <rect x="80" y="272" width="120" height="22" rx="4" fill="#c6f6d5"/><text x="140" y="287" text-anchor="middle" font-size="9" fill="#276749">Entity</text>
  <rect x="210" y="272" width="120" height="22" rx="4" fill="#c6f6d5"/><text x="270" y="287" text-anchor="middle" font-size="9" fill="#276749">Entity Size</text>
  <rect x="340" y="272" width="120" height="22" rx="4" fill="#c6f6d5"/><text x="400" y="287" text-anchor="middle" font-size="9" fill="#276749">Entity Shape</text>
  <rect x="470" y="272" width="100" height="22" rx="4" fill="#c6f6d5"/><text x="520" y="287" text-anchor="middle" font-size="9" fill="#276749">Count</text>
  <rect x="580" y="272" width="100" height="22" rx="4" fill="#c6f6d5"/><text x="630" y="287" text-anchor="middle" font-size="9" fill="#276749">Emotion</text>
  <rect x="690" y="272" width="90" height="22" rx="4" fill="#fed7d7"/><text x="735" y="287" text-anchor="middle" font-size="9" fill="#c53030">Blur</text>
  <rect x="790" y="272" width="120" height="22" rx="4" fill="#fed7d7"/><text x="850" y="287" text-anchor="middle" font-size="9" fill="#c53030">Image Artifacts</text>
  <rect x="920" y="272" width="100" height="22" rx="4" fill="#feebc8"/><text x="970" y="287" text-anchor="middle" font-size="9" fill="#c05621">Proper Noun</text>

  <rect x="80" y="300" width="130" height="22" rx="4" fill="#e9d8fd"/><text x="145" y="315" text-anchor="middle" font-size="9" fill="#553c9a">Color Palette</text>
  <rect x="220" y="300" width="120" height="22" rx="4" fill="#e9d8fd"/><text x="280" y="315" text-anchor="middle" font-size="9" fill="#553c9a">Color Grading</text>

  <!-- Big arrow down to Phase 2 -->
  <line x1="550" y1="415" x2="550" y2="460" stroke="#2b6cb0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 2: EVALUATION ===== -->
  <rect x="30" y="470" width="1040" height="400" rx="10" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1.5"/>
  <text x="550" y="494" text-anchor="middle" font-size="13" font-weight="600" fill="#276749">Phase 2: Caption Evaluation</text>

  <!-- Input: Caption -->
  <rect x="80" y="510" width="200" height="70" rx="8" fill="#fff" stroke="#38a169" stroke-width="2"/>
  <text x="180" y="540" text-anchor="middle" font-size="13" font-weight="600" fill="#38a169">Candidate Caption</text>
  <text x="180" y="558" text-anchor="middle" font-size="10" fill="#4a5568">From model under test</text>
  <text x="180" y="572" text-anchor="middle" font-size="10" fill="#4a5568">(PG, GPT-4o, Claude, etc.)</text>

  <line x1="280" y1="545" x2="340" y2="545" stroke="#38a169" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM QA -->
  <rect x="350" y="510" width="320" height="70" rx="8" fill="#fff" stroke="#38a169" stroke-width="2"/>
  <text x="510" y="536" text-anchor="middle" font-size="13" font-weight="600" fill="#38a169">④ LLM Answers Questions</text>
  <text x="510" y="554" text-anchor="middle" font-size="10" fill="#4a5568">LLM (Claude-3.5 Sonnet) answers QA pairs</text>
  <text x="510" y="570" text-anchor="middle" font-size="10" fill="#4a5568">using ONLY the caption · Options: Yes / No / N/A</text>

  <line x1="670" y1="545" x2="730" y2="545" stroke="#38a169" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Consensus -->
  <rect x="740" y="510" width="270" height="70" rx="8" fill="#fff" stroke="#38a169" stroke-width="2"/>
  <text x="875" y="536" text-anchor="middle" font-size="13" font-weight="600" fill="#38a169">⑤ Consensus (3×)</text>
  <text x="875" y="554" text-anchor="middle" font-size="10" fill="#4a5568">Run QA 3 times per caption</text>
  <text x="875" y="570" text-anchor="middle" font-size="10" fill="#4a5568">Majority vote → final answer</text>

  <!-- Arrow down -->
  <line x1="875" y1="580" x2="875" y2="610" stroke="#38a169" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Scoring -->
  <rect x="350" y="620" width="460" height="60" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
  <text x="580" y="648" text-anchor="middle" font-size="13" font-weight="600" fill="#276749">⑥ Score Computation</text>
  <text x="580" y="666" text-anchor="middle" font-size="10" fill="#4a5568">Compare caption-based answers with reference answers → accuracy per category → combined score</text>

  <!-- Arrow down -->
  <line x1="580" y1="680" x2="580" y2="710" stroke="#276749" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Example result -->
  <rect x="140" y="720" width="840" height="120" rx="8" fill="#1a365d" />
  <text x="560" y="746" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Example Results from CapsBench</text>

  <rect x="170" y="758" width="185" height="30" rx="4" fill="#2b6cb0"/>
  <text x="262" y="778" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PG Captioner: 72.19%</text>
  <rect x="370" y="758" width="185" height="30" rx="4" fill="#2b6cb0"/>
  <text x="462" y="778" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Claude-3.5 Sonnet: 71.78%</text>
  <rect x="570" y="758" width="185" height="30" rx="4" fill="#2b6cb0"/>
  <text x="662" y="778" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">GPT-4o: 70.66%</text>

  <text x="550" y="812" text-anchor="middle" font-size="10" fill="#90cdf4">Weaknesses revealed: entity shape ✓ size ✓ visual artifacts ✓ → all poorly captured by SOTA models</text>
  <text x="550" y="830" text-anchor="middle" font-size="10" fill="#90cdf4">Caption length does not strongly correlate with CapsBench score</text>

  <!-- Footer notes -->
  <text x="550" y="872" text-anchor="middle" font-size="9" fill="#a0aec0">* Image types: film scenes, cartoon scenes, movie posters, invitations, advertisements, casual photography, street photography, landscape photography, interior photography</text>
  <text x="550" y="886" text-anchor="middle" font-size="9" fill="#a0aec0">Inspired by DSG (Davidsonian Scene Graph) and DPG-Bench — reversed from text→image to image→caption evaluation</text>
</svg>
