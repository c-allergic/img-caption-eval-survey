<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="background:#fafafa;width:100%;max-width:1180px">
>
      <defs>
        <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#adb5bd"/>
        </marker>
        <marker id="arw-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4361ee"/>
        </marker>
        <marker id="arw-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2ec4b6"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#fafafa"/>

      <!-- ============ TITLE ============ -->
      <text x="590" y="28" fill="#212529" font-size="11" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">CapsBench Evaluation Pipeline</text>
      <text x="590" y="44" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">200 images · 2,471 yes-no questions · 17 categories</text>

      <!-- ============ LEGEND ============ -->
      <rect x="960" y="55" width="200" height="200" rx="4" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <text x="975" y="75" fill="#212529" font-size="9" font-weight="600" font-family="Inter,sans-serif">Legend</text>
      <rect x="975" y="88" width="14" height="8" rx="2" fill="white" stroke="#4361ee" stroke-width="1.2"/><text x="997" y="96" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Pipeline Step</text>
      <rect x="975" y="106" width="14" height="8" rx="2" fill="white" stroke="#e85d04" stroke-width="1.2"/><text x="997" y="114" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Processing / Action</text>
      <rect x="975" y="124" width="14" height="8" rx="2" fill="white" stroke="#5a189a" stroke-width="1.2"/><text x="997" y="132" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Meta / Control</text>
      <rect x="975" y="142" width="14" height="8" rx="2" fill="white" stroke="#2ec4b6" stroke-width="1.2"/><text x="997" y="150" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Output / Result</text>
      <rect x="975" y="160" width="14" height="8" rx="2" fill="#fff5f5" stroke="#e63946" stroke-width="1.2"/><text x="997" y="168" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Note / Ambiguity</text>
      <rect x="975" y="178" width="14" height="8" rx="2" fill="transparent" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/><text x="997" y="186" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Phase Boundary</text>
      <line x1="975" y1="200" x2="989" y2="200" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/><text x="997" y="204" fill="#6c757d" font-size="7" font-family="Inter,sans-serif">Data Flow</text>

      <!-- ============================= PHASE 1 ============================= -->
      <rect x="30" y="60" width="910" height="310" rx="6" fill="white" stroke="#4361ee" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.5"/>
      <rect x="30" y="60" width="910" height="22" rx="6" fill="#4361ee" fill-opacity="0.06"/>
      <text x="45" y="75" fill="#4361ee" font-size="9" font-weight="700" font-family="Inter,sans-serif">Phase 1 · Benchmark Construction</text>

      <!-- Step 1 -->
      <rect x="55" y="100" width="190" height="72" rx="4" fill="white" stroke="#4361ee" stroke-width="1.2"/>
      <text x="150" y="125" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">① Image Collection</text>
      <text x="150" y="143" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">200 images</text>
      <text x="150" y="158" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">9 diverse types</text>
      <line x1="245" y1="136" x2="305" y2="136" stroke="#4361ee" stroke-width="1.2" marker-end="url(#arw-b)"/>

      <!-- Step 2 -->
      <rect x="315" y="95" width="270" height="82" rx="4" fill="white" stroke="#e85d04" stroke-width="1.2"/>
      <text x="450" y="120" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">② QA Pair Generation</text>
      <text x="450" y="137" fill="#e85d04" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">"Based on the image" — Sec 4.2</text>
      <text x="450" y="153" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">~12 questions/image · 2,471 total</text>
      <text x="450" y="168" fill="#adb5bd" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">Yes/No · Most answers are "yes"</text>
      <line x1="585" y1="136" x2="645" y2="136" stroke="#4361ee" stroke-width="1.2" marker-end="url(#arw-b)"/>

      <!-- Step 3 -->
      <rect x="655" y="100" width="220" height="72" rx="4" fill="white" stroke="#5a189a" stroke-width="1.2"/>
      <text x="765" y="125" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">③ Category Tagging</text>
      <text x="765" y="143" fill="#5a189a" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">17 categories per question</text>
      <text x="765" y="158" fill="#adb5bd" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">General · Color · Entity · ...</text>

      <!-- Ambiguity -->
      <rect x="55" y="195" width="860" height="52" rx="4" fill="#fff5f5" stroke="#e63946" stroke-width="1"/>
      <text x="70" y="212" fill="#e63946" font-size="9" font-weight="600" font-family="Inter,sans-serif">Ambiguity: How are QA pairs generated?</text>
      <text x="70" y="228" fill="#495057" font-size="7.5" font-family="Inter,sans-serif">Reading A: VLM directly looks at image ("Based on the image" — Sec 4.2)</text>
      <text x="70" y="241" fill="#495057" font-size="7.5" font-family="Inter,sans-serif">Reading B: Caption → QA like DPG-Bench Hard ("parallels how we constructed CapsBench")</text>

      <!-- Categories grid -->
      <text x="55" y="278" fill="#5a189a" font-size="9" font-weight="600" font-family="Inter,sans-serif">17 Evaluation Categories</text>
      <g font-size="7" fill="#495057" text-anchor="middle" font-family="Inter,sans-serif">
        <rect x="55" y="290" width="68" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="89" y="304" fill="#4361ee" font-size="6.5">General</text>
        <rect x="129" y="290" width="72" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="165" y="304" fill="#4361ee" font-size="6.5">Image Type</text>
        <rect x="207" y="290" width="58" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="236" y="304" fill="#4361ee" font-size="6.5">Text</text>
        <rect x="271" y="290" width="58" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="300" y="304" fill="#4361ee" font-size="6.5">Color</text>
        <rect x="335" y="290" width="64" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="367" y="304" fill="#4361ee" font-size="6.5">Position</text>
        <rect x="405" y="290" width="64" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="437" y="304" fill="#4361ee" font-size="6.5">Relation</text>
        <rect x="475" y="290" width="80" height="20" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="515" y="304" fill="#4361ee" font-size="6.5">Rel. Position</text>

        <rect x="561" y="290" width="65" height="20" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="593" y="304" fill="#2ec4b6" font-size="6.5">Entity</text>
        <rect x="632" y="290" width="72" height="20" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="668" y="304" fill="#2ec4b6" font-size="6.5">Entity Size</text>
        <rect x="710" y="290" width="78" height="20" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="749" y="304" fill="#2ec4b6" font-size="6.5">Entity Shape</text>

        <rect x="55" y="316" width="58" height="20" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="84" y="330" fill="#2ec4b6" font-size="6.5">Count</text>
        <rect x="119" y="316" width="62" height="20" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="150" y="330" fill="#2ec4b6" font-size="6.5">Emotion</text>
        <rect x="187" y="316" width="56" height="20" rx="3" fill="#fef2f2" stroke="#e63946" stroke-width="0.6"/><text x="215" y="330" fill="#e63946" font-size="6.5">Blur</text>
        <rect x="249" y="316" width="78" height="20" rx="3" fill="#fef2f2" stroke="#e63946" stroke-width="0.6"/><text x="288" y="330" fill="#e63946" font-size="6.5">Artifacts</text>
        <rect x="333" y="316" width="78" height="20" rx="3" fill="#fff7ed" stroke="#e85d04" stroke-width="0.6"/><text x="372" y="330" fill="#e85d04" font-size="6.5">Proper Noun</text>
        <rect x="417" y="316" width="80" height="20" rx="3" fill="#faf5ff" stroke="#5a189a" stroke-width="0.6"/><text x="457" y="330" fill="#5a189a" font-size="6.5">Color Palette</text>
        <rect x="503" y="316" width="80" height="20" rx="3" fill="#faf5ff" stroke="#5a189a" stroke-width="0.6"/><text x="543" y="330" fill="#5a189a" font-size="6.5">Color Grading</text>
      </g>

      <!-- Arrow to Phase 2 -->
      <line x1="485" y1="375" x2="485" y2="405" stroke="#4361ee" stroke-width="1.5" marker-end="url(#arw-b)"/>

      <!-- ============================= PHASE 2 ============================= -->
      <rect x="30" y="415" width="950" height="260" rx="6" fill="white" stroke="#2ec4b6" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.5"/>
      <rect x="30" y="415" width="950" height="22" rx="6" fill="#2ec4b6" fill-opacity="0.06"/>
      <text x="45" y="430" fill="#2ec4b6" font-size="9" font-weight="700" font-family="Inter,sans-serif">Phase 2 · Caption Evaluation</text>

      <!-- Step 4 -->
      <rect x="50" y="460" width="150" height="65" rx="4" fill="white" stroke="#4361ee" stroke-width="1.2"/>
      <text x="125" y="486" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">Candidate</text>
      <text x="125" y="500" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">Caption</text>
      <text x="125" y="516" fill="#adb5bd" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">PG / GPT-4o / Claude</text>
      <line x1="200" y1="492" x2="260" y2="492" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/>

      <!-- Step 5 -->
      <rect x="270" y="455" width="260" height="75" rx="4" fill="white" stroke="#e85d04" stroke-width="1.2"/>
      <text x="400" y="478" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">④ LLM Answers Questions</text>
      <text x="400" y="495" fill="#e85d04" font-size="7.5" text-anchor="middle" font-family="Inter,sans-serif">Claude-3.5 Sonnet</text>
      <text x="400" y="510" fill="#6c757d" font-size="7.5" text-anchor="middle" font-family="Inter,sans-serif">Caption only · No image access</text>
      <text x="400" y="523" fill="#adb5bd" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">Output: Yes / No / N/A</text>
      <line x1="530" y1="492" x2="590" y2="492" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/>

      <!-- Step 6 -->
      <rect x="600" y="460" width="170" height="65" rx="4" fill="white" stroke="#5a189a" stroke-width="1.2"/>
      <text x="685" y="486" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">⑤ Consensus</text>
      <text x="685" y="500" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">(3×)</text>
      <text x="685" y="516" fill="#adb5bd" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">Majority vote</text>
      <line x1="770" y1="492" x2="830" y2="492" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/>

      <!-- Step 7 -->
      <rect x="840" y="460" width="200" height="65" rx="4" fill="white" stroke="#2ec4b6" stroke-width="1.2"/>
      <text x="940" y="486" fill="#212529" font-size="10" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">⑥ Accuracy Score</text>
      <text x="940" y="500" fill="#2ec4b6" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">Per-category + combined</text>
      <text x="940" y="516" fill="#adb5bd" font-size="7" text-anchor="middle" font-family="Inter,sans-serif">Compare vs reference</text>

      <!-- Results -->
      <rect x="50" y="555" width="900" height="95" rx="4" fill="white" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="65" y="572" fill="#212529" font-size="9" font-weight="600" font-family="Inter,sans-serif">Results (Claude-3.5 Sonnet as judge — Section 7)</text>

      <rect x="90" y="585" width="220" height="38" rx="4" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="1"/>
      <text x="200" y="603" fill="#2ec4b6" font-size="10" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">PG Captioner: 72.19%</text>
      <text x="200" y="615" fill="#6c757d" font-size="6.5" text-anchor="middle" font-family="Inter,sans-serif">PGv3 in-house captioner</text>

      <rect x="370" y="585" width="220" height="38" rx="4" fill="#faf5ff" stroke="#5a189a" stroke-width="1"/>
      <text x="480" y="603" fill="#5a189a" font-size="10" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">Claude-3.5: 71.78%</text>
      <text x="480" y="615" fill="#6c757d" font-size="6.5" text-anchor="middle" font-family="Inter,sans-serif">Best proprietary VLM</text>

      <rect x="650" y="585" width="220" height="38" rx="4" fill="#fff7ed" stroke="#e85d04" stroke-width="1"/>
      <text x="760" y="603" fill="#e85d04" font-size="10" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">GPT-4o: 70.66%</text>
      <text x="760" y="615" fill="#6c757d" font-size="6.5" text-anchor="middle" font-family="Inter,sans-serif">OpenAI multimodal</text>

      <text x="65" y="641" fill="#6c757d" font-size="7.5" font-family="Inter,sans-serif">Weaknesses: entity shape, entity size, visual artifacts — poorly captured by all models. Caption length ≠ score.</text>

      <!-- Footer -->
      <text x="30" y="720" fill="#adb5bd" font-size="6.5" font-family="Inter,sans-serif">* Image types: film scenes, cartoon scenes, movie posters, invitations, ads, casual/street/landscape/interior photography</text>
      <text x="30" y="734" fill="#adb5bd" font-size="6.5" font-family="Inter,sans-serif">Inspired by DSG and DPG-Bench. "Reversed": caption evaluation instead of image evaluation.</text>
      <text x="30" y="748" fill="#adb5bd" font-size="6.5" font-family="Inter,sans-serif">Source: Playground v3 — arXiv:2409.10695 · Dataset: huggingface.co/datasets/playgroundai/CapsBench</text>
    </svg>