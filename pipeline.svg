<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="background:#fafafa;width:100%;max-width:1200px">
>
      <defs>
        <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#adb5bd"/>
        </marker>
        <marker id="arw-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4361ee"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#fafafa"/>

      <text x="600" y="30" fill="#212529" font-size="14" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">CapsBench Evaluation Pipeline</text>
      <text x="600" y="50" fill="#6c757d" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">200 images · 2,471 yes-no questions · 17 categories</text>

      <!-- Legend -->
      <rect x="960" y="65" width="220" height="210" rx="4" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <text x="980" y="88" fill="#212529" font-size="11" font-weight="600" font-family="Inter,sans-serif">Legend</text>
      <rect x="980" y="102" width="16" height="10" rx="2" fill="white" stroke="#4361ee" stroke-width="1.2"/><text x="1004" y="111" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Pipeline Step</text>
      <rect x="980" y="122" width="16" height="10" rx="2" fill="white" stroke="#e85d04" stroke-width="1.2"/><text x="1004" y="131" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Processing / Action</text>
      <rect x="980" y="142" width="16" height="10" rx="2" fill="white" stroke="#5a189a" stroke-width="1.2"/><text x="1004" y="151" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Meta / Control</text>
      <rect x="980" y="162" width="16" height="10" rx="2" fill="white" stroke="#2ec4b6" stroke-width="1.2"/><text x="1004" y="171" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Output / Result</text>
      <rect x="980" y="182" width="16" height="10" rx="2" fill="#fff5f5" stroke="#e63946" stroke-width="1.2"/><text x="1004" y="191" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Note / Ambiguity</text>
      <rect x="980" y="202" width="16" height="10" rx="2" fill="transparent" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/><text x="1004" y="211" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Phase Boundary</text>
      <line x1="980" y1="226" x2="996" y2="226" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/><text x="1004" y="230" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Data Flow</text>

      <!-- ============= PHASE 1 ============= -->
      <rect x="30" y="70" width="910" height="330" rx="6" fill="white" stroke="#4361ee" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.5"/>
      <rect x="30" y="70" width="910" height="26" rx="6" fill="#4361ee" fill-opacity="0.06"/>
      <text x="48" y="87" fill="#4361ee" font-size="11" font-weight="700" font-family="Inter,sans-serif">Phase 1 · Benchmark Construction</text>

      <!-- Step 1 -->
      <rect x="55" y="115" width="200" height="78" rx="4" fill="white" stroke="#4361ee" stroke-width="1.2"/>
      <text x="155" y="143" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">① Image Collection</text>
      <text x="155" y="164" fill="#6c757d" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">200 images</text>
      <text x="155" y="180" fill="#6c757d" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">9 diverse types</text>
      <line x1="255" y1="154" x2="315" y2="154" stroke="#4361ee" stroke-width="1.2" marker-end="url(#arw-b)"/>

      <!-- Step 2 -->
      <rect x="325" y="110" width="280" height="88" rx="4" fill="white" stroke="#e85d04" stroke-width="1.2"/>
      <text x="465" y="138" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">② QA Pair Generation</text>
      <text x="465" y="158" fill="#e85d04" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">"Based on the image" — Sec 4.2</text>
      <text x="465" y="176" fill="#6c757d" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">~12 questions/image · 2,471 total</text>
      <text x="465" y="192" fill="#adb5bd" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">Yes/No · Most answers are "yes"</text>
      <line x1="605" y1="154" x2="665" y2="154" stroke="#4361ee" stroke-width="1.2" marker-end="url(#arw-b)"/>

      <!-- Step 3 -->
      <rect x="675" y="115" width="230" height="78" rx="4" fill="white" stroke="#5a189a" stroke-width="1.2"/>
      <text x="790" y="143" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">③ Category Tagging</text>
      <text x="790" y="164" fill="#5a189a" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">17 categories per question</text>
      <text x="790" y="180" fill="#adb5bd" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">General · Color · Entity · ...</text>

      <!-- Ambiguity -->
      <rect x="55" y="218" width="860" height="58" rx="4" fill="#fff5f5" stroke="#e63946" stroke-width="1"/>
      <text x="72" y="237" fill="#e63946" font-size="11" font-weight="600" font-family="Inter,sans-serif">Ambiguity: How are QA pairs generated?</text>
      <text x="72" y="257" fill="#495057" font-size="9.5" font-family="Inter,sans-serif">Reading A: VLM directly looks at image ("Based on the image" — Sec 4.2)</text>
      <text x="72" y="273" fill="#495057" font-size="9.5" font-family="Inter,sans-serif">Reading B: Caption → QA like DPG-Bench Hard ("parallels how we constructed CapsBench")</text>

      <!-- Categories grid -->
      <text x="55" y="308" fill="#5a189a" font-size="11" font-weight="600" font-family="Inter,sans-serif">17 Evaluation Categories</text>
      <g font-size="9" fill="#495057" text-anchor="middle" font-family="Inter,sans-serif">
        <rect x="55" y="320" width="80" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="95" y="337" fill="#4361ee" font-size="8">General</text>
        <rect x="141" y="320" width="85" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="183" y="337" fill="#4361ee" font-size="8">Image Type</text>
        <rect x="232" y="320" width="70" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="267" y="337" fill="#4361ee" font-size="8">Text</text>
        <rect x="308" y="320" width="68" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="342" y="337" fill="#4361ee" font-size="8">Color</text>
        <rect x="382" y="320" width="75" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="419" y="337" fill="#4361ee" font-size="8">Position</text>
        <rect x="463" y="320" width="75" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="500" y="337" fill="#4361ee" font-size="8">Relation</text>
        <rect x="544" y="320" width="95" height="24" rx="3" fill="#eef2ff" stroke="#4361ee" stroke-width="0.6"/><text x="591" y="337" fill="#4361ee" font-size="8">Rel. Position</text>

        <rect x="645" y="320" width="75" height="24" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="682" y="337" fill="#2ec4b6" font-size="8">Entity</text>
        <rect x="726" y="320" width="85" height="24" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="768" y="337" fill="#2ec4b6" font-size="8">Entity Size</text>
        <rect x="817" y="320" width="90" height="24" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="862" y="337" fill="#2ec4b6" font-size="8">Entity Shape</text>

        <rect x="55" y="350" width="68" height="24" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="89" y="367" fill="#2ec4b6" font-size="8">Count</text>
        <rect x="129" y="350" width="75" height="24" rx="3" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="0.6"/><text x="166" y="367" fill="#2ec4b6" font-size="8">Emotion</text>
        <rect x="210" y="350" width="65" height="24" rx="3" fill="#fef2f2" stroke="#e63946" stroke-width="0.6"/><text x="242" y="367" fill="#e63946" font-size="8">Blur</text>
        <rect x="281" y="350" width="90" height="24" rx="3" fill="#fef2f2" stroke="#e63946" stroke-width="0.6"/><text x="326" y="367" fill="#e63946" font-size="8">Artifacts</text>
        <rect x="377" y="350" width="92" height="24" rx="3" fill="#fff7ed" stroke="#e85d04" stroke-width="0.6"/><text x="423" y="367" fill="#e85d04" font-size="8">Proper Noun</text>
        <rect x="475" y="350" width="95" height="24" rx="3" fill="#faf5ff" stroke="#5a189a" stroke-width="0.6"/><text x="522" y="367" fill="#5a189a" font-size="8">Color Palette</text>
        <rect x="576" y="350" width="95" height="24" rx="3" fill="#faf5ff" stroke="#5a189a" stroke-width="0.6"/><text x="623" y="367" fill="#5a189a" font-size="8">Color Grading</text>
      </g>

      <!-- Arrow to Phase 2 -->
      <line x1="485" y1="405" x2="485" y2="435" stroke="#4361ee" stroke-width="1.5" marker-end="url(#arw-b)"/>

      <!-- ============= PHASE 2 ============= -->
      <rect x="30" y="445" width="1080" height="270" rx="6" fill="white" stroke="#2ec4b6" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.5"/>
      <rect x="30" y="445" width="1080" height="26" rx="6" fill="#2ec4b6" fill-opacity="0.06"/>
      <text x="48" y="462" fill="#2ec4b6" font-size="11" font-weight="700" font-family="Inter,sans-serif">Phase 2 · Caption Evaluation</text>

      <!-- Step 4 -->
      <rect x="50" y="490" width="160" height="72" rx="4" fill="white" stroke="#4361ee" stroke-width="1.2"/>
      <text x="130" y="520" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">Candidate Caption</text>
      <text x="130" y="540" fill="#adb5bd" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">PG / GPT-4o / Claude</text>
      <line x1="210" y1="526" x2="270" y2="526" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/>

      <!-- Step 5 -->
      <rect x="280" y="485" width="280" height="82" rx="4" fill="white" stroke="#e85d04" stroke-width="1.2"/>
      <text x="420" y="510" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">④ LLM Answers Questions</text>
      <text x="420" y="528" fill="#e85d04" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">Claude-3.5 Sonnet</text>
      <text x="420" y="545" fill="#6c757d" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">Caption only · No image access</text>
      <text x="420" y="560" fill="#adb5bd" font-size="8.5" text-anchor="middle" font-family="Inter,sans-serif">Output: Yes / No / N/A</text>
      <line x1="560" y1="526" x2="620" y2="526" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/>

      <!-- Step 6 -->
      <rect x="630" y="490" width="190" height="72" rx="4" fill="white" stroke="#5a189a" stroke-width="1.2"/>
      <text x="725" y="520" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">⑤ Consensus (3×)</text>
      <text x="725" y="540" fill="#adb5bd" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">Majority vote per question</text>
      <line x1="820" y1="526" x2="880" y2="526" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arw)"/>

      <!-- Step 7 -->
      <rect x="890" y="490" width="195" height="72" rx="4" fill="white" stroke="#2ec4b6" stroke-width="1.2"/>
      <text x="987" y="520" fill="#212529" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,sans-serif">⑥ Accuracy Score</text>
      <text x="987" y="540" fill="#2ec4b6" font-size="9" text-anchor="middle" font-family="Inter,sans-serif">Per-category + combined</text>
      <text x="987" y="555" fill="#adb5bd" font-size="8.5" text-anchor="middle" font-family="Inter,sans-serif">Compare vs reference</text>

      <!-- Results -->
      <rect x="50" y="585" width="1030" height="100" rx="4" fill="white" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="68" y="605" fill="#212529" font-size="11" font-weight="600" font-family="Inter,sans-serif">Results (Claude-3.5 Sonnet as judge — Section 7)</text>

      <rect x="90" y="618" width="260" height="42" rx="4" fill="#ecfdf5" stroke="#2ec4b6" stroke-width="1"/>
      <text x="220" y="638" fill="#2ec4b6" font-size="12" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">PG Captioner: 72.19%</text>
      <text x="220" y="652" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">PGv3 in-house captioner</text>

      <rect x="400" y="618" width="260" height="42" rx="4" fill="#faf5ff" stroke="#5a189a" stroke-width="1"/>
      <text x="530" y="638" fill="#5a189a" font-size="12" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">Claude-3.5: 71.78%</text>
      <text x="530" y="652" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">Best proprietary VLM</text>

      <rect x="710" y="618" width="260" height="42" rx="4" fill="#fff7ed" stroke="#e85d04" stroke-width="1"/>
      <text x="840" y="638" fill="#e85d04" font-size="12" font-weight="700" text-anchor="middle" font-family="Inter,sans-serif">GPT-4o: 70.66%</text>
      <text x="840" y="652" fill="#6c757d" font-size="8" text-anchor="middle" font-family="Inter,sans-serif">OpenAI multimodal</text>

      <text x="68" y="677" fill="#6c757d" font-size="9" font-family="Inter,sans-serif">Weaknesses: entity shape, entity size, visual artifacts — poorly captured by all models. Caption length ≠ score.</text>

      <!-- Footer -->
      <text x="30" y="760" fill="#adb5bd" font-size="8" font-family="Inter,sans-serif">* Image types: film scenes, cartoon scenes, movie posters, invitations, ads, casual/street/landscape/interior photography</text>
      <text x="30" y="776" fill="#adb5bd" font-size="8" font-family="Inter,sans-serif">Inspired by DSG and DPG-Bench. "Reversed": caption evaluation instead of image evaluation.</text>
      <text x="30" y="792" fill="#adb5bd" font-size="8" font-family="Inter,sans-serif">Source: Playground v3 — arXiv:2409.10695 · Dataset: huggingface.co/datasets/playgroundai/CapsBench</text>
    </svg>